<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>All Articles - Best Towel Warmers</title><meta name="description" content="Browse all towel warmers reviews, buying guides, and comparisons."><link rel="canonical" href="https://best-towel-warmers.com/articles"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="icon" type="image/x-icon" href="favicon.ico"><script src="components/site-config.js?v=5"></script><style>:root{--primary:#880E4F;--primary-light:#AD1457;--accent:#FFB300;--text:#3e3e3e;--text-light:#666;--border:#e5e5e5}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;color:var(--text);background:#fff}.container{max-width:1200px;margin:0 auto;padding:0 1rem}.page-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:3rem 0;text-align:center}.page-header h1{font-size:2.5rem;font-weight:800;margin-bottom:.5rem}.page-header p{opacity:.9;font-size:1.1rem}.articles-section{padding:3rem 0}.category-filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2rem;justify-content:center}.filter-btn{padding:.5rem 1.25rem;border:1px solid var(--border);border-radius:9999px;background:#fff;color:var(--text);font-size:.875rem;font-weight:500;cursor:pointer}.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}.articles-grid{display:grid;gap:1.5rem}.article-card{background:#fff;border-radius:.75rem;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);border:1px solid var(--border)}.article-card:hover{transform:translateY(-4px)}.article-card img{width:100%;height:auto;aspect-ratio:400/192;object-fit:cover}.article-card-content{padding:1.25rem}.article-card-meta{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem}.tag{font-size:.7rem;padding:.2rem .5rem;border-radius:9999px;font-weight:600;text-transform:uppercase}.tag-reviews{background:#FFF8E1;color:#F57F17}.tag-guides{background:#E3F2FD;color:#1565C0}.tag-comparisons{background:#E8F5E9;color:#2E7D32}.article-card-date{font-size:.75rem;color:#999}.article-card h3{font-size:1.1rem;font-weight:700;color:var(--primary);margin-bottom:.5rem}.article-card h3 a{color:inherit;text-decoration:none}.article-card p{color:var(--text-light);font-size:.875rem;margin-bottom:1rem}.read-more{color:var(--accent);font-weight:600;text-decoration:none;font-size:.875rem}.no-results{text-align:center;padding:3rem;color:var(--text-light)}@media(min-width:768px){.articles-grid{grid-template-columns:repeat(2,1fr)}}@media(min-width:1024px){.articles-grid{grid-template-columns:repeat(3,1fr)}}</style></head><body><header id="site-header"></header><section class="page-header"><div class="container"><h1>All Articles</h1><p>Expert reviews, buying guides, and comparisons for towel warmers</p></div></section><section class="articles-section"><div class="container"><div class="category-filters" id="category-filters"><button class="filter-btn active" data-category="all">All</button><button class="filter-btn" data-category="Reviews">Reviews</button><button class="filter-btn" data-category="Guides">Guides</button><button class="filter-btn" data-category="Comparisons">Comparisons</button></div><div class="articles-grid" id="articles-grid"><div class="no-results">Loading articles...</div></div></div></section><footer id="site-footer"></footer><script src="components/site-components.js?v=5"></script><script>let allArticles=[];function formatDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'})}function getTagClass(c){return{Reviews:'tag-reviews',Guides:'tag-guides',Comparisons:'tag-comparisons'}[c]||'tag-guides'}function createCard(a){return'<article class="article-card"><a href="'+a.slug+'"><img src="'+a.image+'" alt="'+a.title+'" width="400" height="192" loading="lazy"></a><div class="article-card-content"><div class="article-card-meta"><span class="tag '+getTagClass(a.category)+'">'+a.category+'</span><span class="article-card-date">'+formatDate(a.publishDate)+'</span></div><h3><a href="'+a.slug+'">'+a.title+'</a></h3><p>'+a.summary+'</p><a href="'+a.slug+'" class="read-more">Read article &rarr;</a></div></article>'}function render(cat){var grid=document.getElementById('articles-grid');var f=cat==='all'?allArticles:allArticles.filter(function(a){return a.category===cat});grid.innerHTML=f.length?f.map(createCard).join(''):'<div class="no-results"><p>No articles yet.</p></div>'}fetch('articles.json').then(function(r){return r.json()}).then(function(articles){articles.sort(function(a,b){return new Date(b.publishDate)-new Date(a.publishDate)});allArticles=articles;render('all');document.querySelectorAll('.filter-btn').forEach(function(btn){btn.addEventListener('click',function(){document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});this.classList.add('active');render(this.dataset.category)})})}).catch(function(){document.getElementById('articles-grid').innerHTML='<div class="no-results"><p>No articles yet.</p></div>'})</script></body></html>
